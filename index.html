<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 왼쪽(검색)과 오른쪽(지도)으로 2분할 */
        #container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 검색창 + 결과 리스트 영역 */
        #search-panel {
            width: 350px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background: #fff;
            z-index: 10;
        }

        /* 검색창 영역 */
        .search-box {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 5px;
        }
        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-box button {
            padding: 8px 12px;
            background-color: #fee500; /* 카카오 시그니처 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button:hover {
            background-color: #fada0a;
        }

        /* 검색 결과 리스트 영역 */
        #places-list {
            flex: 1;
            overflow-y: auto; /* 내용이 많아지면 스크롤 생성 */
            list-style: none;
        }
        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        #places-list li:hover {
            background-color: #f1f3f5;
        }
        #places-list .place-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        #places-list .place-address {
            font-size: 12px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="search-panel">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 검색해보세요" value="이태원 맛집">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="places-list"></ul>
        </div>
        
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=11139f5892d2f841101bacbbd23d00de&libraries=services&autoload=false"></script>
    
    <script>
        let map;
        let ps; // 장소 검색 객체
        let markers = []; // 마커를 담을 배열

        // 1. 카카오맵 스크립트가 안전하게 로드된 후 실행
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map');
            
            // 기본 중심좌표 (위치 권한 거부 시 보여줄 기본 위치: 카카오 본사)
            const defaultOption = {
                center: new kakao.maps.LatLng(33.450701, 126.570667),
                level: 5 // 지도 확대 레벨 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, defaultOption);
            
            // 장소 검색 객체 초기화
            ps = new kakao.maps.services.Places();

            // 2. HTML5의 Geolocation으로 현재 위치 가져오기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 현재 위치로 이동
                    map.setCenter(locPosition);
                    
                    // 현재 위치에 마커 표시
                    displayCurrentLocationMarker(locPosition);
                }, function(error) {
                    console.log("위치 권한을 획득하지 못했습니다.", error);
                });
            }
        });

        // 현재 위치 마커 표시 함수
        function displayCurrentLocationMarker(locPosition) {
            const marker = new kakao.maps.Marker({  
                map: map, 
                position: locPosition
            }); 
            
            const infowindow = new kakao.maps.InfoWindow({
                content : '<div style="padding:5px;font-size:12px;text-align:center;">현재 나의 위치</div>',
                removable : true
            });
            infowindow.open(map, marker);
        }

        // 3. 키워드 검색 요청 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 카카오 장소 검색 서비스 이용
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 검색 목록과 마커를 표출합니다
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 목록과 마커를 표출하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('places-list');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존 마커 및 검색 결과 지우기
            removeMarkers();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                // 마커 생성 및 지도 표시
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                
                // 검색 결과 HTML 아이템 생성
                const itemEl = document.createElement('li');
                itemEl.innerHTML = `
                    <div class="place-name">${places[i].place_name}</div>
                    <div class="place-address">${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</div>
                `;

                // 리스트 아이템 클릭 시 해당 위치로 지도 이동 및 정보창 띄우기
                itemEl.onclick = function() {
                    map.setCenter(placePosition);
                    map.setLevel(3); // 클릭하면 조금 더 확대해서 보기
                };

                listEl.appendChild(itemEl);
                bounds.extend(placePosition);
            }

            // 검색된 장소들이 모두 보이도록 지도 범위 조정
            map.setBounds(bounds);
        }

        // 마커 생성 함수
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });
            markers.push(marker);
            return marker;
        }

        // 마커 초기화 함수
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }
    </script>
</body>
</html>
