<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토부스 위치 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* 검색창 영역 스타일 */
        .search-container {
            display: flex;
            padding: 15px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 15px;
            border: 1px solid #ccd1d9;
            border-radius: 8px;
            outline: none;
        }
        .search-input:focus {
            border-color: #4dabf7;
        }
        .search-button {
            padding: 0 20px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            background-color: #4dabf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-button:hover {
            background-color: #3182ce;
        }
        /* 지도 영역 */
        #map {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        /* 인포윈도우 디자인 */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 160px;
        }
        .info-title {
            font-weight: bold;
            color: #1c7ed6;
            margin-bottom: 4px;
        }
        .info-waiting {
            color: #f03e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="search-container">
        <input 
            type="text" 
            id="keyword-input" 
            class="search-input" 
            placeholder="예: 홍대 포토이즘, 강남 모노맨션, 부평 포토그레이"
            onkeypress="if(event.keyCode==13) executeSearch();"
        >
        <button class="search-button" onclick="executeSearch()">검색</button>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=11139f5892d2f841101bacbbd23d00de&libraries=services"></script>
<script>
    // 전역 변수 설정
    let map;
    let placeService;
    let currentMarkers = []; // 화면에 찍힌 마커들을 관리하는 배열
    let activeInfoWindow = null; // 현재 열려있는 정보창 객체

    // 페이지 로드 시 실행되는 초기화 로직
    window.onload = function() {
        if (typeof kakao === 'undefined' || !kakao.maps) {
            alert("카카오 맵 API 로드 실패! API 키나 개발자 센터 도메인 설정을 다시 확인해봐.");
            return;
        }
        initMap();
    };

    // 지도 초기 구성 함수
    function initMap() {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); // 기본 좌표 (서울시청)
        
        const mapOptions = {
            center: defaultPosition,
            level: 3 // 검색 후 매장 위치가 상세하게 보이도록 확대 레벨을 3으로 설정
        };

        map = new kakao.maps.Map(mapContainer, mapOptions);
        
        // 장소 검색을 수행할 서비스 객체 생성
        placeService = new kakao.maps.services.Places();
    }

    // 검색창 엔터나 버튼 클릭 시 구동되는 메인 검색 함수
    function executeSearch() {
        const inputElement = document.getElementById('keyword-input');
        const userKeyword = inputElement.value.trim();

        // 빈 문자열 방지 예외 처리
        if (!userKeyword) {
            alert('검색어를 입력해 주세요! (예: 홍대 포토이즘)');
            inputElement.focus();
            return;
        }

        // 새로운 검색이 시작되므로 기존 마커와 인포윈도우 싹 청소
        clearMarkers();
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        // 카카오맵 키워드 검색 API 호출 (이번엔 위치 반경 제약 없이 전국 검색)
        placeService.keywordSearch(userKeyword, placesSearchCallback);
    }

    // 카카오 서버에서 검색 결과를 돌려받았을 때 실행되는 콜백 함수
    function placesSearchCallback(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            
            // 검색된 장소들의 위치를 모아서 지도를 한눈에 이동시킬 범위(Bounds) 객체 생성
            const mapBounds = new kakao.maps.LatLngBounds();

            // 검색 결과 배열을 돌며 마커 표시 및 범위 확장
            for (let i = 0; i < data.length; i++) {
                createPhotoBoothMarker(data[i]);
                
                // 해당 매장의 좌표를 지도 범위 객체에 추가
                mapBounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
            }

            // [핵심] 검색된 포토부스 매장들이 전부 다 화면에 보이도록 지도를 자동으로 이동 및 확대/축소 시켜줘!
            map.setBounds(mapBounds);

        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다. 오타가 없는지 확인해 보거나 다른 지역명으로 검색해 보세요!');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('장소 검색 중 알 수 없는 시스템 오류가 발생했습니다.');
        }
    }

    // 포토부스 매장 마커 및 대기 인원 팝업 생성 함수
    function createPhotoBoothMarker(place) {
        const markerPosition = new kakao.maps.LatLng(place.y, place.x);
        
        // 마커 생성
        const marker = new kakao.maps.Marker({
            map: map,
            position: markerPosition
        });

        // 다음 검색 때 지울 수 있도록 배열에 보관
        currentMarkers.push(marker);

        // 기획서 기능 3: 대기 인원 랜덤 가상 생성 (0~4팀)
        const waitingTeams = Math.floor(Math.random() * 5); 

        // 인포윈도우 내용 레이아웃 구성 (가게 주소 정보 추가하여 가독성 업그레이드)
        const infoContent = `
            <div class="info-window">
                <div class="info-title">${place.place_name}</div>
                <div style="font-size:11px; color:#666; margin-bottom:5px;">${place.address_name}</div>
                <div class="info-waiting">현재 대기 인원: ${waitingTeams}팀 🔥</div>
            </div>
        `;

        const infowindow = new kakao.maps.InfoWindow({
            content: infoContent,
            removable: true // 정보창 우측 상단에 닫기(X) 버튼 활성화
        });

        // 마커 클릭 시 정보창 열기 이벤트 등록
        kakao.maps.event.addListener(marker, 'click', function() {
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }
            infowindow.open(map, marker);
            activeInfoWindow = infowindow; 
        });
    }

    // 기존 마커들을 지도에서 일괄 삭제하는 함수
    function clearMarkers() {
        for (let i = 0; i < currentMarkers.length; i++) {
            currentMarkers[i].setMap(null);
        }
        currentMarkers = []; 
    }
</script>
</body>
</html>
