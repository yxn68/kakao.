<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토부스 위치 공유 서비스</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* 기획서 기능 2: 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            background-color: #f1f3f5;
            border-bottom: 2px solid #dee2e6;
            z-index: 10;
        }
        .tab-item {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #495057;
            transition: all 0.2s ease;
        }
        .tab-item:hover {
            background-color: #e9ecef;
        }
        .tab-item.active {
            background-color: #ffffff;
            color: #212529;
            border-bottom: 3px solid #4dabf7; 
        }
        /* 지도 영역 */
        #map {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        /* 내 위치 찾기 버튼 스타일 */
        .map-overlay-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        /* 인포윈도우 디자인 */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 150px;
        }
        .info-title {
            font-weight: bold;
            color: #1c7ed6;
            margin-bottom: 4px;
        }
        .info-waiting {
            color: #f03e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="tab-menu">
        <div class="tab-item active" onclick="switchTab(this, '포토이즘')">포토이즘</div>
        <div class="tab-item" onclick="switchTab(this, '모노맨션')">모노맨션</div>
        <div class="tab-item" onclick="switchTab(this, '포토그레이')">포토그레이</div>
    </div>

    <div id="map"></div>

    <button class="map-overlay-btn" onclick="getCurrentLocation()">📍 내 위치 중심</button>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=11139f5892d2f841101bacbbd23d00de&libraries=services"></script>
<script>
    // 전역 변수 설정
    let map;
    let placeService;
    let currentMarkers = []; // 현재 지도에 표시된 마커 배열
    let activeInfoWindow = null; // 현재 열려있는 인포윈도우 객체
    let currentSelectedBrand = '포토이즘'; // 현재 선택된 브랜드 키워드 저장용

    // 페이지 로드 시 초기화 시작
    window.onload = function() {
        if (typeof kakao === 'undefined' || !kakao.maps) {
            alert("카카오 맵 API 로드 실패! API 키나 플랫폼 도메인 설정을 확인해봐.");
            return;
        }
        initMap();
    };

    // 지도 초기화 함수
    function initMap() {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); // 위치 실패 시 기본값 (서울시청)
        
        const mapOptions = {
            center: defaultPosition, 
            level: 4 // 중심지가 잘 보이고 매장들이 한눈에 들어오는 축척 레벨
        };

        map = new kakao.maps.Map(mapContainer, mapOptions);
        placeService = new kakao.maps.services.Places();

        // 지도를 드래그해서 옮길 때마다 그 지역 주변의 브랜드 매장을 새로 고침하는 이벤트 등록
        kakao.maps.event.addListener(map, 'dragend', function() {
            searchPhotoBooth(currentSelectedBrand);
        });

        // 기획서 기능 4: 앱 시작하자마자 현재 내 위치 찾기 작동
        getCurrentLocation();
    }

    // 현재 위치를 추적하여 지도를 이동시키는 함수
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(latitude, longitude);
                    
                    // 내 진짜 주변 위치로 지도 이동
                    map.setCenter(currentPosition);
                    
                    // 이동 후 현재 선택된 브랜드 검색 실행
                    searchPhotoBooth(currentSelectedBrand);
                }, 
                function(error) {
                    console.warn("GPS 호출에 실패하여 기본 위치에서 검색합니다. 지도를 움직여 보세요.");
                    searchPhotoBooth(currentSelectedBrand);
                }
            );
        } else {
            searchPhotoBooth(currentSelectedBrand);
        }
    }

    // 탭 클릭 시 브랜드 전환 처리 함수
    function switchTab(element, brandKeyword) {
        // 모든 탭의 active 클래스 제거 후 선택된 탭 활성화
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        // 전역 브랜드 키워드 갱신
        currentSelectedBrand = brandKeyword;

        // 지시사항 반영: 기존 마커 및 인포윈도우 완전히 정리
        clearMarkers();
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        // 바뀐 브랜드로 즉시 검색
        searchPhotoBooth(brandKeyword);
    }

    // 주변 포토부스 위치 검색 함수
    function searchPhotoBooth(keyword) {
        // [핵심] 현재 내 눈에 보이는 지도 화면의 정중앙 좌표를 기준으로 탐색해
        const currentCenter = map.getCenter();
        
        // 반경을 5km(5000m)로 넉넉하게 잡아서 주변 매장을 놓치지 않게 조절
        const searchOptions = {
            location: currentCenter,
            radius: 5000
        };

        // 카카오 키워드 검색 수행
        placeService.keywordSearch(keyword, placesSearchCallback, searchOptions);
    }

    // 검색 결과 콜백 함수
    function placesSearchCallback(data, status, pagination) {
        // 탭이 바뀌거나 지도가 움직였으므로 기존 마커 삭제
        clearMarkers();

        if (status === kakao.maps.services.Status.OK) {
            // [해결 포인트] 불확실한 카테고리 텍스트 매칭 검사를 없애고 검색된 브랜드를 그대로 마커로 변환!
            for (let i = 0; i < data.length; i++) {
                createPhotoBoothMarker(data[i]);
            }
            console.log(`${currentSelectedBrand} 매장 ${data.length}개 발견 완료!`);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            console.log(`현재 지도 중심 주변 5km 이내에 ${currentSelectedBrand} 매장이 없습니다.`);
        }
    }

    // 마커 및 정보창 생성 함수
    function createPhotoBoothMarker(place) {
        const markerPosition = new kakao.maps.LatLng(place.y, place.x);
        
        // 마커 생성 및 지도 표시
        const marker = new kakao.maps.Marker({
            map: map,
            position: markerPosition
        });

        // 탭 전환 시 지울 수 있도록 전역 마커 리스트에 저장
        currentMarkers.push(marker);

        // 기획서 기능 3: 대기 인원 랜덤 가상 생성 (0~4팀)
        const waitingTeams = Math.floor(Math.random() * 5); 

        // 인포윈도우 내부 레이아웃 설계
        const infoContent = `
            <div class="info-window">
                <div class="info-title">${place.place_name}</div>
                <div>거리: 약 ${place.distance ? place.distance + 'm' : '계산불가'}</div>
                <div class="info-waiting">현재 대기: ${waitingTeams}팀 🔥</div>
            </div>
        `;

        const infowindow = new kakao.maps.InfoWindow({
            content: infoContent,
            removable: true 
        });

        // 마커 클릭 시 정보 윈도우 오픈 이벤트
        kakao.maps.event.addListener(marker, 'click', function() {
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }
            infowindow.open(map, marker);
            activeInfoWindow = infowindow; 
        });
    }

    // 화면의 모든 마커를 지우는 함수
    function clearMarkers() {
        for (let i = 0; i < currentMarkers.length; i++) {
            currentMarkers[i].setMap(null);
        }
        currentMarkers = []; 
    }
</script>
</body>
</html>
