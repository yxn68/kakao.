<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토부스 위치 공유 서비스</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* 기획서 기능 2: 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            background-color: #f1f3f5;
            border-bottom: 2px solid #dee2e6;
            z-index: 10;
        }
        .tab-item {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #495057;
            transition: all 0.2s ease;
        }
        .tab-item:hover {
            background-color: #e9ecef;
        }
        .tab-item.active {
            background-color: #ffffff;
            color: #212529;
            border-bottom: 3px solid #4dabf7; 
        }
        /* 지도 영역 */
        #map {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        /* 주변 검색 알림창 및 내 위치 버튼 스타일 */
        .map-overlay-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .map-overlay-btn:hover {
            background-color: #f8f9fa;
        }
        /* 인포윈도우 디자인 */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .info-title {
            font-weight: bold;
            color: #1c7ed6;
            margin-bottom: 4px;
        }
        .info-category {
            font-size: 11px;
            color: #868e96;
            margin-bottom: 4px;
        }
        .info-waiting {
            color: #f03e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="tab-menu">
        <div class="tab-item active" onclick="switchTab(this, '포토이즘', '문화,예술 > 문화시설 > 사진관,스튜디오')">포토이즘</div>
        <div class="tab-item" onclick="switchTab(this, '모노맨션', '문화,예술 > 문화시설 > 사진관,스튜디오')">모노맨션</div>
        <div class="tab-item" onclick="switchTab(this, '포토그레이', '문화,예술 > 문화시설 > 사진관,스튜디오')">포토그레이</div>
    </div>

    <div id="map"></div>

    <button class="map-overlay-btn" onclick="getCurrentLocation()">📍 내 위치 찾기</button>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=11139f5892d2f841101bacbbd23d00de&libraries=services"></script>
<script>
    // 전역 변수 설정
    let map;
    let placeService;
    let currentMarkers = []; 
    let activeInfoWindow = null; 
    let currentSelectedBrand = '포토이즘'; // 현재 선택된 브랜드 키워드 기억
    let currentSelectedCategory = '문화,예술 > 문화시설 > 사진관,스튜디오'; // 현재 선택된 카테고리 코드 명칭 기억

    // 페이지 로드 시 실행
    window.onload = function() {
        if (typeof kakao === 'undefined' || !kakao.maps) {
            alert("카카오 맵 API 로드 실패! 키 설정이나 도메인 등록을 확인해봐.");
            return;
        }
        initMap();
    };

    // 지도 초기화 함수
    function initMap() {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); // 서울시청 기본값
        
        const mapOptions = {
            center: defaultPosition, 
            level: 4 
        };

        map = new kakao.maps.Map(mapContainer, mapOptions);
        placeService = new kakao.maps.services.Places();

        // [해결 대책 1] 지도를 드래그해서 멈췄을 때, 해당 중심점 기준으로 주변을 재검색하는 이벤트 추가!
        kakao.maps.event.addListener(map, 'dragend', function() {
            searchPhotoBooth(currentSelectedBrand, currentSelectedCategory);
        });

        // 기획서 기능 4: 앱 열자마자 현재 위치 서비스 시작
        getCurrentLocation();
    }

    // 현재 위치를 추적하여 지도를 이동시키는 함수
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(latitude, longitude);
                    
                    // 내 주변 위치로 중심 이동
                    map.setCenter(currentPosition);
                    
                    // 중심 이동 후 자동으로 검색 실행
                    searchPhotoBooth(currentSelectedBrand, currentSelectedCategory);
                }, 
                function(error) {
                    // GPS 허용을 안 했거나 오류가 나면 콘솔에 띄우고 기본 위치에서 검색 진행
                    console.warn("GPS 호출에 실패했습니다. 지도를 움직여서 주변을 탐색해 보세요.");
                    searchPhotoBooth(currentSelectedBrand, currentSelectedCategory);
                }
            );
        } else {
            searchPhotoBooth(currentSelectedBrand, currentSelectedCategory);
        }
    }

    // 탭 전환 함수
    function switchTab(element, brandKeyword, categoryCode) {
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        // 상태값 저장
        currentSelectedBrand = brandKeyword;
        currentSelectedCategory = categoryCode;

        // 기존 마커 청소
        clearMarkers();
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        // 검색 실행
        searchPhotoBooth(brandKeyword, categoryCode);
    }

    // 주변 포토부스 위치 검색 함수
    function searchPhotoBooth(keyword, categoryCode) {
        // [해결 대책 2] 현재 보고 있는 지도 화면의 '중심점'을 실시간으로 획득
        const currentCenter = map.getCenter();
        
        // 반경을 기존 2km에서 5km(5000)로 넓혀서 더 넓은 주변을 찾아주도록 개선!
        const searchOptions = {
            location: currentCenter,
            radius: 5000
        };

        // 카카오 키워드 검색 수행
        placeService.keywordSearch(keyword, function(data, status, pagination) {
            processSearchResults(data, status, pagination, categoryCode);
        }, searchOptions);
    }

    // 검색 결과 콜백 함수
    function processSearchResults(data, status, pagination, categoryCode) {
        // 기존 마커를 한 번 지워주고 새로 그려야 매끄럽게 전환돼
        clearMarkers();

        if (status === kakao.maps.services.Status.OK) {
            let foundCount = 0;
            for (let i = 0; i < data.length; i++) {
                // 내부 카테고리 매칭 검사
                if (data[i].category_name.includes(categoryCode)) {
                    createPhotoBoothMarker(data[i]);
                    foundCount++;
                }
            }
            console.log(`${currentSelectedBrand} 주변 매장 ${foundCount}개 발견!`);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            // 알림창(alert)을 계속 띄우면 사용이 불편하므로, 콘솔로그로 대체하고 지도를 움직이도록 유도해
            console.log('현재 지도 중심 주변 5km 이내에 매장이 없습니다. 지도를 이동해 보세요.');
        }
    }

    // 마커 및 정보창 생성 함수
    function createPhotoBoothMarker(place) {
        const markerPosition = new kakao.maps.LatLng(place.y, place.x);
        
        const marker = new kakao.maps.Marker({
            map: map,
            position: markerPosition
        });

        currentMarkers.push(marker);

        // 기획서 기능 3: 대기 인원 랜덤 생성
        const waitingTeams = Math.floor(Math.random() * 5); 

        const infoContent = `
            <div class="info-window">
                <div class="info-title">${place.place_name}</div>
                <div class="info-category">분류: 사진관,스튜디오</div>
                <div>거리: 중심에서 약 ${place.distance ? place.distance + 'm' : '확인불가'}</div>
                <div class="info-waiting">현재 대기: ${waitingTeams}팀 🔥</div>
            </div>
        `;

        const infowindow = new kakao.maps.InfoWindow({
            content: infoContent,
            removable: true 
        });

        kakao.maps.event.addListener(marker, 'click', function() {
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }
            infowindow.open(map, marker);
            activeInfoWindow = infowindow; 
        });
    }

    // 마커 삭제 함수
    function clearMarkers() {
        for (let i = 0; i < currentMarkers.length; i++) {
            currentMarkers[i].setMap(null);
        }
        currentMarkers = []; 
    }
</script>
</body>
</html>
