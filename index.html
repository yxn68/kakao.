<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토부스 위치 공유 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        /* 기획서 기능 2: 3개 탭 메뉴 디자인 */
        .tab-menu {
            display: flex;
            background-color: #f1f3f5;
            border-bottom: 2px solid #dee2e6;
            z-index: 10;
        }
        .tab-item {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #495057;
            transition: all 0.2s ease;
        }
        .tab-item:hover {
            background-color: #e9ecef;
        }
        /* 활성화된 현재 탭 스타일 */
        .tab-item.active {
            background-color: #ffffff;
            color: #212529;
            border-bottom: 3px solid #4dabf7; 
        }
        /* 지도 영역 */
        #map {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        /* 인포윈도우 커스텀 CSS */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .info-title {
            font-weight: bold;
            color: #1c7ed6;
            margin-bottom: 4px;
        }
        .info-category {
            font-size: 11px;
            color: #868e96;
            margin-bottom: 4px;
        }
        .info-waiting {
            color: #f03e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="tab-menu">
        <div class="tab-item active" onclick="switchTab(this, '포토이즘', '문화,예술 > 문화시설 > 사진관,스튜디오')">포토이즘</div>
        <div class="tab-item" onclick="switchTab(this, '모노맨션', '문화,예술 > 문화시설 > 사진관,스튜디오')">모노맨션</div>
        <div class="tab-item" onclick="switchTab(this, '포토그레이', '문화,예술 > 문화시설 > 사진관,스튜디오')">포토그레이</div>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=11139f5892d2f841101bacbbd23d00de&libraries=services"></script>
<script>
    // 전역 변수 선언
    let map;
    let placeService;
    let currentMarkers = []; // 지도에 렌더링된 마커를 담는 배열
    let activeInfoWindow = null; // 현재 화면에 띄워진 인포윈도우 객체

    // 앱 실행 시(페이지 로딩 완료 시) 즉시 구동
    window.onload = function() {
        // 카카오 API 정상 로드 여부 검증 안전장치
        if (typeof kakao === 'undefined' || !kakao.maps) {
            alert("카카오 맵 API를 불러오지 못했습니다. 앱 키와 플랫폼 도메인 설정을 확인하세요.");
            return;
        }
        initializeMapAndLocation();
    };

    // 기획서 기능 4: 앱 시작 시 기본 지도 설정 및 위치 서비스 활성화 함수
    function initializeMapAndLocation() {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); // 위치 권한 거부 시 띄울 기본 중심 (서울시청)
        
        const mapOptions = {
            center: defaultPosition, 
            level: 4 // 지도 확대 수준 (포토부스 확인하기 좋은 크기)
        };

        // 지도 생성 및 검색 서비스 객체 초기화
        map = new kakao.maps.Map(mapContainer, mapOptions);
        placeService = new kakao.maps.services.Places();

        // 기획서 기능 1 & 기능 4: 브라우저 위치 서비스를 활용해 사용자의 현재 좌표 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(latitude, longitude);
                    
                    // 지도의 중심을 실시간 현재 내 위치로 이동시킴
                    map.setCenter(currentPosition);
                    
                    // 현재 위치를 기반으로 첫 번째 탭(포토이즘) 자동 주변 탐색 시작
                    searchPhotoBooth('포토이즘', '문화,예술 > 문화시설 > 사진관,스튜디오');
                }, 
                function(error) {
                    // 사용자가 위치 권한을 거부했거나 GPS 연결 오류 시 안내 후 기본 위치 검색
                    console.warn("현재 위치 정보를 가져올 수 없어 기본 좌표로 포토부스를 검색합니다.");
                    searchPhotoBooth('포토이즘', '문화,예술 > 문화시설 > 사진관,스튜디오');
                }
            );
        } else {
            // 브라우저 자체가 위치 서비스를 지원하지 않는 구형 브라우저일 때
            searchPhotoBooth('포토이즘', '문화,예술 > 문화시설 > 사진관,스튜디오');
        }
    }

    // 탭 전환 처리 및 마커 제어 함수
    function switchTab(element, brandKeyword, categoryCode) {
        // 모든 탭의 active 클래스 초기화 후 선택한 탭 활성화
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        // 지시사항 반영: 탭 전환 시 기존 화면의 마커와 열려있던 윈도우를 깨끗하게 청소
        clearMarkers();
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        // 바뀐 브랜드 키워드와 카테고리 정보로 주변 재검색
        searchPhotoBooth(brandKeyword, categoryCode);
    }

    // 포토부스 위치 검색 요청 함수
    function searchPhotoBooth(keyword, categoryCode) {
        // 현재 설정되어 있는 지도 화면의 중심점을 획득
        const currentCenter = map.getCenter();
        
        // 내 위치 주변 반경 2km 이내 조건 설정
        const searchOptions = {
            location: currentCenter,
            radius: 2000
        };

        // 카카오맵 키워드 검색 수행 및 익명 콜백 함수로 카테고리 인자 넘겨주기
        placeService.keywordSearch(keyword, function(data, status, pagination) {
            processSearchResults(data, status, pagination, categoryCode);
        }, searchOptions);
    }

    // 검색된 데이터 처리 및 카테고리 필터링 콜백 함수
    function processSearchResults(data, status, pagination, categoryCode) {
        if (status === kakao.maps.services.Status.OK) {
            for (let i = 0; i < data.length; i++) {
                // 가져온 장소 데이터의 내부 카테고리가 '사진관,스튜디오' 코드가 맞는지 최종 필터 검사
                if (data[i].category_name.includes(categoryCode)) {
                    createPhotoBoothMarker(data[i]);
                }
            }
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            console.log('선택하신 포토부스가 주변 2km 반경 안에 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('위치 기반 장소 검색 중 시스템 에러가 발생했습니다.');
        }
    }

    // 마커 렌더링 및 인포윈도우(대기 인원) 바인딩 함수
    function createPhotoBoothMarker(place) {
        const markerPosition = new kakao.maps.LatLng(place.y, place.x);
        
        // 지도 위에 마커 객체 배치
        const marker = new kakao.maps.Marker({
            map: map,
            position: markerPosition
        });

        // 탭 리셋 시 추적할 수 있도록 전역 마커 배열에 누적 보관
        currentMarkers.push(marker);

        // 기획서 기능 3: 포토부스 대기 인원 정보 생성 (프로토타입용 0~4팀 실시간 가상 생성)
        const waitingTeams = Math.floor(Math.random() * 5); 

        // 말풍선 인포윈도우 내부 레이아웃 설계
        const infoContent = `
            <div class="info-window">
                <div class="info-title">${place.place_name}</div>
                <div class="info-category">분류: 사진관,스튜디오</div>
                <div>거리: 내 주변 약 ${place.distance ? place.distance + 'm' : '계산불가'}</div>
                <div class="info-waiting">현재 대기 인원: ${waitingTeams}팀 🔥</div>
            </div>
        `;

        const infowindow = new kakao.maps.InfoWindow({
            content: infoContent,
            removable: true // 닫기(X) 버튼 활성화
        });

        // 마커를 마우스로 터치/클릭했을 때 상세 정보창 오픈 이벤트 등록
        kakao.maps.event.addListener(marker, 'click', function() {
            // 다른 마커 정보창이 켜져 있다면 화면 정리 차원에서 닫기 처리
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }
            infowindow.open(map, marker);
            activeInfoWindow = infowindow; // 현재 활성화된 정보창으로 등록
        });
    }

    // 화면 초기화를 위한 기존 마커 일괄 제거 함수
    function clearMarkers() {
        for (let i = 0; i < currentMarkers.length; i++) {
            currentMarkers[i].setMap(null); // 지도 가시성 끄기
        }
        currentMarkers = []; // 배열 비우기
    }
</script>
</body>
</html>
